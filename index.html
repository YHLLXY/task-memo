<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <title>我的备忘录</title>
</head>
<body>

  <!-- ===== 顶栏 ===== -->
  <div class="header">
    <button class="icon-btn" id="themeToggle" aria-label="切换主题">🌓</button>
    <h1 style="font-size:18px;font-weight:600;">我的备忘录</h1>
    <button class="icon-btn" id="installBtn" aria-label="安装应用" style="display:none;" title="添加到主屏幕">📲</button>
    <span id="dateLabel" style="font-size:12px;color:var(--text-secondary);"></span>
  </div>

  <!-- ===== 进度条 + 统计 ===== -->
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="stats" id="stats"></div>

  <!-- ===== 日期导航 ===== -->
  <div class="date-nav" id="dateNav">
    <button class="date-nav-btn" id="datePrev" aria-label="前一天">←</button>
    <span class="date-nav-label" id="dateNavLabel">今天</span>
    <button class="date-nav-btn" id="dateNext" aria-label="后一天" disabled>→</button>
    <button class="date-today-btn" id="dateTodayBtn" style="display:none;">回到今天</button>
  </div>

  <!-- ===== 滚动区域 ===== -->
  <div class="scroll-area">

    <!-- 活跃任务列表 -->
    <div class="task-list" id="taskList"></div>

    <!-- 已完成区域 -->
    <div class="done-section" id="doneSection"></div>

    <!-- 清除已完成 -->
    <div class="clear-done" id="clearDone">清除已完成</div>

  </div>

  <!-- ===== 底部输入区 ===== -->
  <div class="input-area" id="inputArea">
    <div class="priority-select" id="prioritySelect">
      <button class="priority-btn" data-p="low">🟢 不急</button>
      <button class="priority-btn active" data-p="medium">🟡 中等</button>
      <button class="priority-btn" data-p="high">🔴 紧急</button>
    </div>

    <!-- 日期时间选择器 -->
    <div class="deadline-row">
      <span class="dl-icon">⏰</span>

      <!-- 原生控件（opacity:0 隐藏，通过 label 触发） -->
      <input type="date" id="deadlineDate" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
      <input type="time" id="deadlineTime" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">

      <!-- 自定义标签（使用 for 属性关联原生控件，兼容所有浏览器） -->
      <label class="deadline-label-btn" id="deadlineDateLabel" for="deadlineDate">选择日期</label>
      <span class="deadline-sep">·</span>
      <label class="deadline-label-btn" id="deadlineTimeLabel" for="deadlineTime">选择时间</label>

      <button class="clear-deadline-btn" id="clearDeadlineBtn" title="清除截止时间">✕</button>
    </div>

    <div class="input-row">
      <input class="task-input" id="taskInput" placeholder="要做些什么？" enterkeyhint="done">
      <button class="add-btn" id="addBtn">添加</button>
    </div>
  </div>

  <!-- ===== 确认弹窗 ===== -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <p id="modalMsg"></p>
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="modalCancel">取消</button>
        <button class="modal-btn confirm" id="modalConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- ===== 长按菜单 ===== -->
  <div class="context-menu" id="contextMenu"></div>

  <!-- ===== 第三方库 ===== -->
  <script src="js/lib/anime.umd.min.js"></script>

  <!-- ===== JS 模块（依赖顺序加载） ===== -->
  <script src="js/ui.js"></script>
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/events.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/animate.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
